<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>रजिस्ट्रेशन - Sarthak Online Center</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #e3f2fd;
      margin: 0;
      padding: 20px;
    }
    .register-container {
      max-width: 450px;
      margin: auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #1976d2;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      background-color: #1976d2;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .back-link {
      text-align: center;
      margin-top: 15px;
    }
    .back-link a {
      text-decoration: none;
      color: #1976d2;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <h2>📝 नया रजिस्ट्रेशन</h2>
    <form onsubmit="showThankYou(); return false;">
      <label>पूरा नाम:</label>
      <input type="text" required>

      <label>मोबाइल नंबर:</label>
      <input type="text" required>

      <label>ईमेल आईडी:</label>
      <input type="email">

      <label>पासवर्ड:</label>
      <input type="password" required>

      <label>पासवर्ड दोबारा:</label>
      <input type="password" required>

      <button type="submit">रजिस्टर करें</button>
    </form>
    <div class="back-link">
      <p><a href="index.html#wallet-login">🔙 वापस लॉगिन पेज पर जाएं</a></p>
    </div>
  </div>

  <script>
    function showThankYou() {
      alert("🎉 रजिस्ट्रेशन सफल रहा! आपकी जानकारी सुरक्षित भेज दी गई है।");
    }
  </script>
</body>
</html>
