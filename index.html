<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sarthak Online Center - Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f8ff;
    }
    header {
      background-color: #00796b;
      padding: 20px;
      color: white;
      text-align: center;
    }
    .login-container {
      max-width: 400px;
      margin: 60px auto;
      background-color: white;
      padding: 25px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 10px;
    }
    h2 {
      text-align: center;
      color: #1976d2;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
    }
    .register-link {
      text-align: center;
      margin-top: 10px;
    }
    .register-link a {
      color: #00796b;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>सार्थक ऑनलाइन सेंटर</h1>
    <p>आपका डिजिटल साथी</p>
  </header>

  <div class="login-container">
    <h2>🔐 लॉगिन करें</h2>
    <form action="dashboard.html" method="get">
      <label for="mobile">📱 मोबाइल नंबर:</label>
      <input type="text" id="mobile" name="mobile" placeholder="10-digit मोबाइल नंबर" required>

      <label for="password">🔑 पासवर्ड:</label>
      <input type="password" id="password" name="password" placeholder="********" required>

      <button type="submit">🔓 लॉगिन</button>

      <div class="register-link">
        <p><a href="#">🔑 पासवर्ड भूल गए?</a></p>
        <p>अभी तक रजिस्टर नहीं किया? <a href="register.html">यहाँ रजिस्टर करें</a></p>
      </div>
    </form>
  </div>
</body>
</html>
